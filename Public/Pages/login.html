<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
</head>
<body>
    <img src="./images/android-chrome-192x192.png" alt="SmartPark Logo" width="80">
    <h1>Login To SmartPark</h1>
    <form action="" method="POST">
        <label for="emailid">Email</label>
        <input type="email" id="emailid" name="email" placeholder="Enter the Email " required><br><br>
        <label for="passwordid">Password</label>
        <input type="password" id="passwordid" name="password" placeholder="Enter the password" required><br><br>
        <input type="submit" value="Login">

    </form>

    <a href="register.html">New Here? Register</a>

</body>
</html>
