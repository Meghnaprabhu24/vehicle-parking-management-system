<!Doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registeration page</title>
    </head>
    <body>
        <img src="../images/android-chrome-192x192.png" alt="SmartPark Logo" width="80">
        <h1>Create Your Account</h1>
        <form action="" method="POST">
            <label for="nameid">Name</label>
            <input type="text" id="nameid" name="name" placeholder="Enter Your Name" required><br><br>
            <label for="telid">Phone number </label>
            <input type="tel" id="telid" name="phoneno" placeholder="Enter your valid Phone number" required><br><br>
            <label for="emailid" >Email</label>
            <input type="email" id="emailid" name="email" placeholder="Enter your active email" required><br><br>
            <label for="passwordid">Password</label>
            <input type="password" id="passwordid" name="password" placeholder="Enter the password" required><br><br>
            <label for="confirmpswid">ConfirmPassword</label>
            <input type="password" id="confirmpswid" name="confirmpassword" placeholder="Write the confirm password" required><br><br>
            <input type="submit" value="Register">
        </form>

        <a href="login.html">Already have an account? Login</a>

        <footer><p>&copy; 2025 SmartPark. All rights reserved.</p></footer>
    </body>
</html>
